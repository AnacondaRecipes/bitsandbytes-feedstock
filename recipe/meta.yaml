{% set name = "bitsandbytes" %}
{% set version = "0.49.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # Don't use the PyPI source tarball as this already contains compiled code.
  url: https://github.com/bitsandbytes-foundation/bitsandbytes/archive/refs/tags/{{ version }}.tar.gz
  sha256: 522afad2d62234ae0d3a47d14786c19111ca516cd4b1e2b11c58dc59e4d282d9

build:
  number: 0
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version != "None"]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version == "None"]
  string: gpu_mps_h{{PKG_HASH}}_{{ PKG_BUILDNUM }}  # [gpu_variant == "metal"]
  skip: true  # [py<310]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler("cuda") }}                 # [cuda_compiler_version != "None"]
    - cmake
    - ninja
    - make
  host:
    - python
    - pip
    - cuda-cudart-dev   # [(cuda_compiler_version or "").startswith("12")]
    - libcublas-dev     # [(cuda_compiler_version or "").startswith("12")]
    - libcusparse-dev   # [(cuda_compiler_version or "").startswith("12")]
    - cuda-version  {{ cuda_compiler_version }}  # [cuda_compiler_version != "None"]
    - scikit-build-core
    - setuptools >=77.0.3
    - trove-classifiers >=2025.8.6.13
  run:
    - libgomp        # [linux]
    - _openmp_mutex  # [linux]
    - packaging >=20.9
    - python
    - pytorch >=2.3,<3
    - numpy >=1.17

test:
  imports:
    - bitsandbytes
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/bitsandbytes-foundation/bitsandbytes
  summary: Lightweight wrapper for CUDA 8-bit optimizers and quantization functions
  description: |
    bitsandbytes is a library for efficient deep learning that enables 8-bit and 4-bit
    quantization for reduced memory usage and faster inference. It provides 8-bit optimizers
    for memory-efficient training, LLM.int8() for 8-bit matrix multiplication, and QLoRA
    for 4-bit quantization. The library is designed to work seamlessly with PyTorch and
    integrates with the Hugging Face ecosystem for large language model fine-tuning.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/bitsandbytes-foundation/bitsandbytes
  doc_url: https://huggingface.co/docs/bitsandbytes

extra:
  recipe-maintainers:
    - xhochy
    - iamthebot
    - shaowei-su
    - snapbug
