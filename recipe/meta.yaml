{% set name = "bitsandbytes" %}
{% set version = "0.49.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # Don't use the PyPI source tarball as this already contains compiled code.
  url: https://github.com/bitsandbytes-foundation/bitsandbytes/archive/refs/tags/{{ version }}.tar.gz
  sha256: 96aa206fbc94bf383e1aee0dbcd4909d1759afb57f425250ca5cec699671da86
  patches:
    - patches/0001-fix-metal-paths.patch  # [osx]
    - patches/0002-allow-setting-CMAKE_OSX_DEPLOYMENT_TARGET.patch  # [osx]

build:
  number: 0
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version != "None"]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version == "None"]
  string: gpu_mps_py{{ CONDA_PY }}h{{PKG_HASH}}_{{ PKG_BUILDNUM }}  # [gpu_variant == "metal"]
  skip: true  # [py<310 or py>313]
  missing_dso_whitelist:  # [osx]
    - '*/libomp.dylib'    # [osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler("cuda") }}  # [cuda_compiler_version != "None"]
    - cmake
    - ninja
    - make  # [unix]
  host:
    - python
    - pip
    - cuda-cudart-dev   # [cuda_compiler_version != "None"]
    - libcublas-dev     # [cuda_compiler_version != "None"]
    - libcusparse-dev   # [cuda_compiler_version != "None"]
    - cuda-version  {{ cuda_compiler_version }}  # [cuda_compiler_version != "None"]
    - scikit-build-core
    - setuptools >=77.0.3
    - trove-classifiers >=2025.8.6.13
  run:
    - libgomp        # [linux]
    - _openmp_mutex  # [linux]
    - llvm-openmp    # [osx]
    - packaging >=20.9
    - python
    - pytorch >=2.3,<3             # [gpu_variant == "None"]
    - pytorch-gpu >=2.3,<3         # [gpu_variant != "None"]
    - numpy >=1.17
    # On macOS, the GPU accelerated backend, MPS, can be used from macOS v12.3. This isn't tightly dependent on the
    # SDK version used.
    - __osx >=12.3  # [gpu_variant == "metal"]
    - __cuda        # [(gpu_variant or "").startswith("cuda")] 

test:
  imports:
    - bitsandbytes
    - bitsandbytes.nn
    - bitsandbytes.optim
  source_files:
    - tests/
    - check_bnb_install.py
  requires:
    - pip
    ## Missing lion-pytorch
    - einops >=0.8.0,<0.9
    # - lion-pytorch ==0.2.3
    - pytest >=8.3,<9
    - scipy >=1.11.4,<2
    - transformers >=4.30.1,<5
    #  ImportError: Using `low_cpu_mem_usage=True` or a `device_map` requires Accelerate: `pip install 'accelerate>=0.26.0'`
    - huggingface_accelerate >=0.26.0
  commands:
    - pip check
    # Verify library can load and find binaries (CUDA only - script hardcodes .cuda() calls)
    # Unable to run on NVIDIA T4G with CUDA capability sm_75 which is what PBP has.
    - python check_bnb_install.py  # [cuda_compiler_version != "None" and target_platform != "linux-aarch64"]
    # Keep tests focused: test_optim needs lion-pytorch; skip known MPS/CPU bf16 and benchmark failures.
    - pytest -v tests/test_generation.py tests/test_modules.py tests/test_autograd.py tests/test_functional.py --ignore=tests/test_optim.py -k "not test_4bit_quant and not (test_matmullt and bf16 and cpu) and not benchmark"  # [target_platform != "linux-aarch64"]
    # PyTorch's CUDA 13 aarch64 build does not support the T4G test GPU; run non-generation tests on CPU.
    - CUDA_VISIBLE_DEVICES="" BNB_TEST_DEVICE=cpu pytest -v tests/test_modules.py tests/test_autograd.py tests/test_functional.py --ignore=tests/test_optim.py -k "not test_4bit_quant and not (test_matmullt and bf16 and cpu) and not benchmark"  # [target_platform == "linux-aarch64"]




about:
  home: https://github.com/bitsandbytes-foundation/bitsandbytes
  summary: Lightweight wrapper for CUDA 8-bit optimizers and quantization functions
  description: |
    bitsandbytes is a library for efficient deep learning that enables 8-bit and 4-bit
    quantization for reduced memory usage and faster inference. It provides 8-bit optimizers
    for memory-efficient training, LLM.int8() for 8-bit matrix multiplication, and QLoRA
    for 4-bit quantization. The library is designed to work seamlessly with PyTorch and
    integrates with the Hugging Face ecosystem for large language model fine-tuning.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/bitsandbytes-foundation/bitsandbytes
  doc_url: https://huggingface.co/docs/bitsandbytes

extra:
  recipe-maintainers:
    - xhochy
    - iamthebot
    - shaowei-su
    - snapbug
